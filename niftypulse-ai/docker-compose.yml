version: '3.9'

services:
  db:
    image: postgres:15
    container_name: niftypulse-db
    environment:
      POSTGRES_DB: niftypulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: niftypulse-redis
    ports:
      - "6379:6379"

  backend:
    image: python:3.11-slim
    container_name: niftypulse-backend
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  pg_data:
